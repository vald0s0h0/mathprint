# Déploiement continu : CHAQUE push sur main publie les images "latest" sur
# GHCR (après tests). Aucune action dev supplémentaire — le NAS se met à jour
# tout seul via la tâche planifiée DSM (scripts/nas-update.sh, voir
# DEPLOIEMENT_NAS.md §7). Les tags "sha-XXXXXXX" permettent un retour arrière
# précis (MATHPRINT_VERSION=sha-XXXXXXX dans .env).
#
# Chaque image n'est reconstruite que si son code a changé (filtre par
# chemins) ; le cache GitHub Actions rend les rebuilds rapides.
name: Deploy latest images

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # relance manuelle (reconstruit tout)

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-latest
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  # MathALÉA n'est pas versionné dans ce dépôt (trop volumineux) : commit
  # épinglé de https://github.com/mathalea/mathalea correspondant à la v2.8.2.
  MATHALEA_PIN: 3c6092ef38154b802c063ad500b27f12fdf03df8

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mathalea: ${{ steps.filter.outputs.mathalea }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend/**'
            web:
              - 'frontend/**'
            mathalea:
              - 'mathalea-service/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: cd backend && python -m pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npx tsc -b

  meta:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.v.outputs.sha }}
      time: ${{ steps.v.outputs.time }}
    steps:
      - id: v
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"

  api:
    needs: [changes, test, meta]
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          build-args: |
            GIT_SHA=${{ needs.meta.outputs.sha }}
            BUILD_TIME=${{ needs.meta.outputs.time }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-api:sha-${{ needs.meta.outputs.sha }}

  web:
    needs: [changes, test, meta]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            GIT_SHA=${{ needs.meta.outputs.sha }}
            BUILD_TIME=${{ needs.meta.outputs.time }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-web:sha-${{ needs.meta.outputs.sha }}

  mathalea:
    needs: [changes, test, meta]
    if: needs.changes.outputs.mathalea == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cloner MathALÉA (épinglé)
        run: |
          git clone --quiet https://github.com/mathalea/mathalea.git mathalea
          git -C mathalea checkout --quiet "$MATHALEA_PIN"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: mathalea-service/Dockerfile
          push: true
          cache-from: type=gha,scope=mathalea
          cache-to: type=gha,scope=mathalea,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-mathalea:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mathprint-mathalea:sha-${{ needs.meta.outputs.sha }}
