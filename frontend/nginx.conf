server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        client_max_body_size 200m;   # dépôt de scans PDF volumineux
    }

    # les bundles Vite sont fingerprintés (hash dans le nom) : cache long sûr
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html et build.json ne doivent JAMAIS être mis en cache par le
    # navigateur, sinon l'ancienne UI persiste après une mise à jour du
    # conteneur (symptôme : « la mise à jour ne s'applique pas »)
    location = /build.json {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
